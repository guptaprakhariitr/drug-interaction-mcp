# Smithery registry config — https://smithery.ai/docs/build/project-config/smithery-yaml
# This is an HTTP-transport MCP server; Smithery hosts the listing and proxies
# clients straight to our Cloudflare Workers endpoint.

name: drug-interaction-mcp
displayName: Drug Interaction Checker
description: |
  Drug-drug interaction checker for clinical LLMs. RxNorm + openFDA + DailyMed. Returns severity, mechanism, citations.
homepage: https://drug-interaction-mcp.atlasword.workers.dev
repository: https://github.com/guptaprakhariitr/drug-interaction-mcp
license: MIT
version: "0.2.0"

runtime: container

startCommand:
  type: http
  url: https://drug-interaction-mcp.atlasword.workers.dev/mcp
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API key (optional)
        description: |
          Bearer token from https://drug-interaction-mcp.atlasword.workers.dev/upgrade.
          Leave blank for the anonymous free tier (~100 calls/month/IP).
    required: []
  exampleConfig:
    apiKey: ""
  commandFunction: |-
    (config) => ({
      type: "http",
      url: "https://drug-interaction-mcp.atlasword.workers.dev/mcp",
      headers: config.apiKey ? { Authorization: `Bearer ${config.apiKey}` } : {}
    })

remote:
  type: http
  url: https://drug-interaction-mcp.atlasword.workers.dev/mcp

categories:
  - healthcare
  - clinical
  - research
tags:
  - rxnorm
  - drug-interaction
  - clinical-llm
  - ddi
  - dailymed
  - pharmacology

tools:
  - name: check_interaction
  - name: check_interactions_multi
  - name: normalize_drug_name
  - name: dose_guide
  - name: find_alternatives

auth:
  type: bearer
  required: false
  description: |
    Optional. Anonymous free tier works for ~100 calls/month per IP. For higher
    quotas, grab a key from https://drug-interaction-mcp.atlasword.workers.dev/upgrade and pass
    it as `Authorization: Bearer <key>`.
